name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example, 0.1.0 or v0.1.0)"
        required: true
        type: string
      git_ref:
        description: "Git ref to release from"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Normalize release inputs
        id: release
        env:
          VERSION_INPUT: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          version="$VERSION_INPUT"
          version="${version#v}"
          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "::error::version contains unsupported characters"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Render release notes
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.md
        shell: bash
        run: |
          set -euo pipefail
          sed \
            -e "s|__VERSION__|$VERSION|g" \
            -e "s|__TAG__|$TAG|g" \
            -e "s|__REPOSITORY__|$GITHUB_REPOSITORY|g" \
            .github/release-notes.md > "$RELEASE_NOTES_FILE"

          if grep -Eq '__[A-Z_]+__' "$RELEASE_NOTES_FILE"; then
            echo "::error::release notes contain unresolved placeholders"
            exit 1
          fi

      - name: Create release page
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          GIT_REF: ${{ inputs.git_ref }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.md
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists"
            exit 1
          fi

          release_notes="$(<"$RELEASE_NOTES_FILE")"
          gh release create "$TAG" \
            --target "$GIT_REF" \
            --title "$TAG" \
            --generate-notes \
            --notes "$release_notes"
