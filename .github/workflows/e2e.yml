name: E2E

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Released BosonOS version to boot (for example, 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: true

jobs:
  qemu-boot:
    name: Boot released QEMU image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize release input
        id: release
        env:
          VERSION_INPUT: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          version="${VERSION_INPUT#v}"
          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "::error::version contains unsupported characters"
            exit 1
          fi

          artifact="bosonos-qemu-x86_64-v$version.tar.gz"
          {
            echo "tag=v$version"
            echo "archive=$artifact"
            echo "checksum=$artifact.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Download release image
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          ARCHIVE: ${{ steps.release.outputs.archive }}
          CHECKSUM: ${{ steps.release.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --pattern "$ARCHIVE" \
            --pattern "$CHECKSUM"

      - name: Verify and extract image
        env:
          ARCHIVE: ${{ steps.release.outputs.archive }}
          CHECKSUM: ${{ steps.release.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum --check "$CHECKSUM")
          mkdir -p image
          tar -xzf "dist/$ARCHIVE" -C image
          test -s image/bzImage
          test -s image/initramfs.cpio.gz

      - name: Install QEMU
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends qemu-system-x86

      - name: Boot image and verify runtime
        shell: bash
        run: |
          set -euo pipefail

          log="$RUNNER_TEMP/boson-qemu-console.log"
          timeout --signal=TERM --kill-after=10s 120s \
            qemu-system-x86_64 \
              -machine pc,accel=tcg \
              -cpu max \
              -smp 2 \
              -m 1024M \
              -nographic \
              -no-reboot \
              -kernel image/bzImage \
              -initrd image/initramfs.cpio.gz \
              -append "console=ttyS0,115200 rdinit=/sbin/gluon panic=1" \
            >"$log" 2>&1 &
          qemu_pid=$!

          cleanup() {
            kill "$qemu_pid" 2>/dev/null || true
            wait "$qemu_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          booted=false
          for _ in $(seq 1 90); do
            if grep --fixed-strings --quiet "gluon info: starting" "$log" \
              && grep --fixed-strings --quiet "Boson.Boot online" "$log"; then
              booted=true
              break
            fi

            if ! kill -0 "$qemu_pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done

          cp "$log" qemu-console.log
          cat "$log"

          if [[ "$booted" != true ]]; then
            echo "::error::BosonOS did not reach the runtime boot marker"
            exit 1
          fi

      - name: Upload QEMU console log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-console-${{ steps.release.outputs.tag }}
          path: qemu-console.log
          if-no-files-found: warn
          retention-days: 14
