name: Build Release Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version whose GitHub Release receives the image"
        required: true
        type: string
      device_id:
        description: "Device id to build: qemu-x86_64 or qemu-aarch64"
        required: true
        default: "qemu-x86_64"
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version }}-${{ inputs.device_id }}
  cancel-in-progress: true

jobs:
  select-target:
    name: Select Release Target
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      device_id: ${{ steps.release.outputs.device_id }}
      package_attr: ${{ steps.release.outputs.package_attr }}
      artifact_prefix: ${{ steps.release.outputs.artifact_prefix }}
      runner: ${{ steps.release.outputs.runner }}

    steps:
      - name: Normalize release inputs
        id: release
        env:
          VERSION_INPUT: ${{ inputs.version }}
          DEVICE_ID_INPUT: ${{ inputs.device_id }}
        shell: bash
        run: |
          set -euo pipefail
          version="$VERSION_INPUT"
          version="${version#v}"
          device_id="$DEVICE_ID_INPUT"

          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "::error::version contains unsupported characters"
            exit 1
          fi

          case "$device_id" in
            qemu-x86_64)
              runner="ubuntu-24.04"
              package_attr="boson-qemu-image"
              ;;
            qemu-aarch64)
              runner="ubuntu-24.04-arm"
              package_attr="boson-qemu-image"
              ;;
            *)
              echo "::error::Unsupported device_id '$device_id'"
              echo "Supported device ids: qemu-x86_64, qemu-aarch64"
              exit 1
              ;;
          esac

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "device_id=$device_id"
            echo "package_attr=$package_attr"
            echo "artifact_prefix=bosonos-$device_id-v$version"
            echo "runner=$runner"
          } >> "$GITHUB_OUTPUT"

  build-release:
    name: Build and Upload Image
    needs: select-target
    runs-on: ${{ needs.select-target.outputs.runner }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.select-target.outputs.tag }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OS image
        id: build
        shell: bash
        run: |
          set -euo pipefail
          out_link="result-${{ needs.select-target.outputs.device_id }}"

          nix build ".#${{ needs.select-target.outputs.package_attr }}" \
            --print-build-logs \
            --out-link "$out_link"

          mkdir -p dist
          tar -C "$out_link" \
            -czf "dist/${{ needs.select-target.outputs.artifact_prefix }}.tar.gz" \
            .
          (
            cd dist
            sha256sum "${{ needs.select-target.outputs.artifact_prefix }}.tar.gz" \
              > "${{ needs.select-target.outputs.artifact_prefix }}.tar.gz.sha256"
          )

      - name: Upload image to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.select-target.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG does not exist. Run the Release workflow first."
            exit 1
          fi

          gh release upload "$TAG" dist/* --clobber
