name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Check Elixir formatting
        working-directory: src/runtime
        run: mix format --check-formatted

      - name: Check Zig formatting
        working-directory: src/gluon
        run: nix shell nixpkgs#zig_0_15 --command zig fmt --check build.zig src

      - name: Evaluate flake checks
        run: nix flake check --no-build

  build:
    name: Build ${{ matrix.target }} image
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
            target: qemu-x86_64
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
            target: qemu-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and smoke-test QEMU image
        run: |
          nix build \
            ".#packages.${{ matrix.system }}.boson-qemu-image" \
            ".#checks.${{ matrix.system }}.qemu-boot-smoke" \
            --print-build-logs
